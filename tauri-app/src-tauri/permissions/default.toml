[default]
description = "Default permissions for ClaudeUsage app commands"
permissions = [
    "allow-get-usage",
    "allow-refresh-now",
    "allow-get-accounts",
    "allow-add-account",
    "allow-remove-account",
    "allow-rename-account",
    "allow-set-active-account",
    "allow-save-credentials",
    "allow-test-connection",
    "allow-get-config",
    "allow-update-config",
    "allow-toggle-overlay",
    "allow-set-overlay-layout",
    "allow-set-overlay-opacity",
    "allow-set-overlay-position",
]

[[permission]]
identifier = "allow-get-usage"
description = "Allows the get_usage command"
commands.allow = ["get_usage"]

[[permission]]
identifier = "allow-refresh-now"
description = "Allows the refresh_now command"
commands.allow = ["refresh_now"]

